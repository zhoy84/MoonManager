<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- 背景圆 - 深蓝紫 -->
  <circle cx="100" cy="100" r="98" fill="#1a1a2e"/>
  
  <!-- 外圈 - 玫红 -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#e94560" stroke-width="4"/>
  
  <!-- 内圈 - 淡紫 -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#533483" stroke-width="1" opacity="0.5"/>
  
  <!-- 月牙形状 - 在左边 -->
  <path d="M 75 50 A 50 50 0 1 0 75 150" 
        fill="none" stroke="#f0f0f0" stroke-width="8"/>
  
  <!-- MM 文字 - 居中白色大字 -->
  <text x="100" y="115" 
        text-anchor="middle" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="64" 
        font-weight="bold"
        fill="#ffffff">
    MM
  </text>
  
  <!-- 星星 -->
  <circle cx="50" cy="50" r="2" fill="#fff"/>
  <circle cx="150" cy="65" r="1.5" fill="#e94560"/>
  <circle cx="55" cy="150" r="1" fill="#fff"/>
</svg>