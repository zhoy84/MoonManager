<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- 背景圆 - 深蓝紫渐变 -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#bgGrad)"/>
  
  <!-- 外圈 - 紫色粗边框 -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#a855f7" stroke-width="6"/>
  
  <!-- 内圈 - 淡紫 -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
  
  <!-- 月牙形状 -->
  <path d="M 75 50 A 50 50 0 1 0 75 150" 
        fill="none" stroke="#f0f0f0" stroke-width="8"/>
  
  <!-- MM文字 -->
  <text x="100" y="115" 
        text-anchor="middle" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="64" 
        font-weight="bold"
        fill="#ffffff">
    MM
  </text>
  
  <!-- 星星 -->
  <circle cx="50" cy="50" r="2" fill="#fff"/>
  <circle cx="150" cy="65" r="1.5" fill="#a855f7"/>
  <circle cx="55" cy="150" r="1" fill="#fff"/>
</svg>